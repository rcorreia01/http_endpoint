<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVS Gateway - Node Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        /* Custom map control for sidebar */
        .leaflet-control-sidebar-toggle {
            background-color: white;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-clip: padding-box;
        }
        .leaflet-control-sidebar-toggle:hover {
            background-color: #f4f4f4;
        }
        
        /* Sidebar styling */
        #map-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        #sidebar {
            position: absolute;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        #sidebar.open {
            right: 0;
        }
        .sidebar-header {
            padding: 15px;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-close {
            cursor: pointer;
            font-size: 20px;
        }
        .node-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .node-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .node-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }
        .node-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        .node-actions button {
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            border-radius: 3px;
        }
        .node-actions button:hover {
            background: #eee;
        }
        
        /* Tooltip styling */
        .node-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
        }
    </style>
</head>
<body>

<div id="map-container">
    <div id="map"></div>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3 style="margin: 0; font-size: 16px;">Registered Nodes</h3>
            <span class="sidebar-close" onclick="toggleSidebar()">✕</span>
        </div>
        <div class="node-list" id="nodeList">
            <!-- Nodes dynamically injected here by JS -->
        </div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    // Initialize the map, centered globally
    const map = L.map('map').setView([20, 0], 2);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let popup = L.popup();

    // Store references to map objects for hiding/showing/updating
    const nodeObjects = {};
    const nodesData = [];
    
    // Manage state for adding vs editing
    let currentEditEui = null;

    // Function to draw a node on the map
    function drawNode(node) {
        // Clear existing objects for this node if they exist (for updates)
        if (nodeObjects[node.dev_eui]) {
            map.removeLayer(nodeObjects[node.dev_eui].marker);
            map.removeLayer(nodeObjects[node.dev_eui].circle);
            if (nodeObjects[node.dev_eui].tooltip) {
                map.removeLayer(nodeObjects[node.dev_eui].tooltip);
            }
        }

        // Draw the center dot
        const marker = L.circleMarker([node.latitude, node.longitude], {
            color: 'purple',
            fillColor: 'purple',
            fillOpacity: 1.0,
            radius: 4
        }).addTo(map).bindPopup(`<b>Name:</b> ${node.name || 'Unnamed'}<br><b>Device EUI:</b> ${node.dev_eui}<br><b>Range:</b> ${node.range}m`);

        // Draw permanent name tooltip
        let tooltip = null;
        if (node.name) {
             tooltip = marker.bindTooltip(node.name, {
                 permanent: true, 
                 direction: 'top',
                 className: 'node-tooltip',
                 offset: [0, -5]
             });
        }

        // Draw the range circle
        const circle = L.circle([node.latitude, node.longitude], {
            color: 'yellow',
            fillColor: 'yellow',
            fillOpacity: 0.3,
            radius: parseFloat(node.range) 
        }).addTo(map);

        nodeObjects[node.dev_eui] = { marker, circle, tooltip, is_hidden: false };
    }

    // Render the sidebar list
    function renderSidebar() {
        const listDiv = document.getElementById('nodeList');
        listDiv.innerHTML = '';
        
        nodesData.forEach(node => {
            const isHidden = nodeObjects[node.dev_eui]?.is_hidden;
            
            const item = document.createElement('div');
            item.className = 'node-item';
            item.innerHTML = `
                <h4>${node.name || 'Unnamed Node'}</h4>
                <div style="font-size: 11px; color: #666;">EUI: ${node.dev_eui}</div>
                <div class="node-actions">
                    <button onclick="centerOnNode('${node.dev_eui}')">📍 Center</button>
                    <button onclick="toggleNodeVisibility('${node.dev_eui}')">${isHidden ? '👁️ Show' : '🙈 Hide'}</button>
                    <button onclick="editNode('${node.dev_eui}')">✏️ Edit</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    // Sidebar action functions
    window.centerOnNode = function(dev_eui) {
        const node = nodesData.find(n => n.dev_eui === dev_eui);
        if(node) {
            map.flyTo([node.latitude, node.longitude], 15);
        }
    };

    window.toggleNodeVisibility = function(dev_eui) {
        const objs = nodeObjects[dev_eui];
        if(!objs) return;
        
        if(objs.is_hidden) {
            objs.marker.addTo(map);
            objs.circle.addTo(map);
            objs.is_hidden = false;
        } else {
            map.removeLayer(objs.marker);
            map.removeLayer(objs.circle);
            objs.is_hidden = true;
        }
        renderSidebar();
    };

    window.editNode = function(dev_eui) {
        const node = nodesData.find(n => n.dev_eui === dev_eui);
        if(!node) return;
        
        currentEditEui = dev_eui;
        // Open a popup to edit at its current location
        openFormPopup(node.latitude, node.longitude, node);
        
        alert("Edit mode active. You can fill out the form, or click anywhere else on the map to move it.");
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    // Fetch existing nodes from the API and draw them
    fetch('/nodes')
        .then(response => response.json())
        .then(nodes => {
            if(Array.isArray(nodes)) {
                nodes.forEach(node => {
                    nodesData.push(node);
                    drawNode(node);
                });
                renderSidebar();
            }
        })
        .catch(err => console.error("Error fetching nodes:", err));

    function openFormPopup(lat, lng, editNodeData = null) {
        const isEdit = editNodeData !== null;
        const defaultEui = isEdit ? editNodeData.dev_eui : '';
        const defaultName = isEdit ? (editNodeData.name || '') : '';
        const defaultRange = isEdit ? editNodeData.range : '';
        const defaultAltitude = isEdit ? (editNodeData.altitude || 0) : 0;
        
        const popupContent = `
            <div style="font-family: Arial, sans-serif; font-size: 14px;">
                <h3 style="margin-top: 0;">${isEdit ? 'Edit Node' : 'Add New Node'}</h3>
                ${!isEdit ? `
                <label><b>Device EUI:</b></label><br>
                <input type="text" id="devEui" placeholder="e.g. 0011223344556677" style="width: 100%; margin-bottom: 10px;" value="${defaultEui}"><br>
                ` : `<div style="margin-bottom: 10px;"><b>Device EUI:</b> ${defaultEui}</div>`}
                
                <label><b>Name:</b></label><br>
                <input type="text" id="nodeName" placeholder="e.g. Campus Roof" style="width: 100%; margin-bottom: 10px;" value="${defaultName}"><br>
                
                <label><b>Range (meters):</b></label><br>
                <input type="number" id="nodeRange" placeholder="e.g. 5000" style="width: 100%; margin-bottom: 10px;" value="${defaultRange}"><br>

                <label><b>Altitude (meters, optional):</b></label><br>
                <input type="number" id="nodeAltitude" placeholder="e.g. 10" style="width: 100%; margin-bottom: 15px;" value="${defaultAltitude}"><br>
                
                <button id="saveNodeBtn" style="padding: 5px 10px; cursor: pointer;">${isEdit ? 'Save Changes' : 'Save Node'}</button>
                ${isEdit ? `<button onclick="window.currentEditEui = null; map.closePopup();" style="padding: 5px 10px; cursor: pointer; float:right;">Cancel</button>` : ''}
            </div>
        `;

        const popup = L.popup()
            .setLatLng([lat, lng])
            .setContent(popupContent)
            .openOn(map);

        // Add event listener to the save button inside the popup
        setTimeout(() => {
            const btn = document.getElementById('saveNodeBtn');
            if (btn) {
                btn.addEventListener('click', () => {
                    const devEui = isEdit ? editNodeData.dev_eui : document.getElementById('devEui').value;
                    const name = document.getElementById('nodeName').value;
                    const range = document.getElementById('nodeRange').value;
                    const altitude = document.getElementById('nodeAltitude').value || 0;

                    if (!devEui || !range) {
                        alert("Device EUI and Range are required!");
                        return;
                    }

                    const payload = {
                        dev_eui: devEui,
                        name: name,
                        latitude: lat,
                        longitude: lng,
                        altitude: parseFloat(altitude), 
                        range: range
                    };

                    const endpoint = isEdit ? `/nodes/${devEui}` : '/nodes';
                    const method = isEdit ? 'PUT' : 'POST';

                    fetch(endpoint, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'ok') {
                            if(isEdit) {
                                // Update existing
                                const idx = nodesData.findIndex(n => n.dev_eui === devEui);
                                if(idx !== -1) nodesData[idx] = payload;
                                currentEditEui = null;
                            } else {
                                // Push new
                                nodesData.push(payload);
                            }
                            drawNode(payload);
                            renderSidebar();
                            map.closePopup();
                        } else {
                            alert(`Failed to ${isEdit ? 'update' : 'add'} node: ` + data.message);
                        }
                    })
                    .catch(error => {
                        console.error(`Error saving node:`, error);
                        alert("An error occurred. Check the console.");
                    });
                });
            }
        }, 100);
    }

    // Add click event to map to place/move a node
    map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        
        if(currentEditEui) {
            // We are moving an existing node
            const node = nodesData.find(n => n.dev_eui === currentEditEui);
            openFormPopup(lat, lng, node);
        } else {
            // Adding a brand new node
            openFormPopup(lat, lng, null);
        }
    });

    // --- User Geolocation Feature --- Removed

    // Add sidebar toggle control button
    L.Control.SidebarToggle = L.Control.extend({
        options: {
            position: 'topright'
        },
        onAdd: function(map) {
            const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-sidebar-toggle');
            container.innerHTML = '☰'; // Hamburger menu icon
            container.title = "Toggle Nodes Sidebar";

            container.onclick = function(e) {
                e.stopPropagation();
                toggleSidebar();
            }
            return container;
        }
    });
    
    map.addControl(new L.Control.SidebarToggle());

</script>
</body>
</html>
